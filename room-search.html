<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>교실/실습실 찾기</title>
    <link rel="stylesheet" href="src/css/main.css?v=4.31">
    <link rel="stylesheet" href="src/css/room-search.css?v=4.31">
</head>
<body>
    <header class="search-header">
        <button class="back-btn" onclick="location.href='index.html'" title="홈으로">🏠</button>
        <h1>교실/실습실 찾기</h1>
    </header>

    <div class="search-bar-container">
        <input type="text" id="room-search-input" class="search-input" placeholder="실습실 이름 또는 호수(예: 304) 검색" autocomplete="off">
    </div>

    <div class="list-container" id="room-list-container">
        <!-- JS로 동적 생성 -->
    </div>

    <div style="text-align: center; margin-bottom: 40px;">
        <button onclick="window.open('src/docs/school_map.pdf', '_blank')" 
            style="width: 100%; max-width: 400px; padding: 16px; background: #334155; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 0 auto; display: block;">
            🗺️ 학교 전체 도면(PDF) 보기
        </button>
    </div>

    <script src="src/js/room-search.js?v=4.31"></script>
</body>
</html>
