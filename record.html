<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 생활기록</title>
  <link rel="stylesheet" href="src/css/main.css">
  <link rel="stylesheet" href="src/css/stu-list.css">
  <link rel="stylesheet" href="src/css/record.css">
</head>

<body>

  <!-- 상단 헤더 -->
  <div class="header-row">
    <button type="button" class="btn btn-back" aria-label="뒤로가기"></button>
    <div style="display: flex; align-items: center; gap: 10px;">
      <h2 id="pageTitle" style="margin:0;">...</h2>
    </div>
    <button type="submit" form="recordForm" class="btn btn-save" id="submitBtn">기록 저장</button>
  </div>

  <form id="recordForm">
    <!-- 숨김 필드 -->
    <input type="hidden" id="recordTime">

    <!-- 잘한 일 / 못한 일 -->
    <div class="behavior-row" id="behavior-section">
      <div class="behavior-group-good">
        <label for="good">잘한 일</label>
        <select id="good">
          <option value="">선택</option>
        </select>
      </div>
      <div class="behavior-group-bad">
        <label for="bad">못한 일</label>
        <select id="bad">
          <option value="">선택</option>
        </select>
      </div>
    </div>

    <!-- 자세히 -->
    <div class="label-row-with-btn">
      <label for="detail">자세히</label>
      <button type="button" id="viewSurveyBtn" class="btn-survey-view" style="display:none;">📋 기초조사 보기</button>
    </div>
    <textarea id="detail" placeholder="상세 내용 입력"></textarea>


    <div class="photo-attachment-section">
      <label class="left-align-label">📸 사진 첨부 (반성문, 수첩 기록 등)</label>

      <div id="vflat-notice" class="vflat-notice" onclick="openVFlat()">
        💡 <span>vFlat 앱</span>을 사용하시면 더 깔끔하게 저장됩니다.<br>
        <span class="sub-text">(터치 시 설치 페이지 이동)</span>
      </div>

      <div class="photo-upload-container">
        <label for="photoInput" class="custom-file-label">
          <span class="upload-icon">📷</span>
          <span class="upload-text">카메라 촬영 또는 갤러리 파일 선택</span>
        </label>
        <input type="file" id="photoInput" accept="image/*, image/heic, image/heif" style="display:none;">
        <div id="fileNameDisplay" class="file-name-display">선택된 파일 없음</div>
      </div>

      <div id="photoPreviewContainer" class="photo-preview-container">
        <!-- 사진 미리보기가 여기에 표시됩니다 -->
      </div>
    </div>
  </form>

  <div class="record-log">
    <h3>📚 기록 내역</h3>
    <div id="logContainer">⏳ 기록을 불러오는 중입니다...</div>
  </div>

  <!-- 기초조사 팝업 레이어 -->
  <div id="overlay"></div>
  <div id="popup"></div>

  <script type="module" src="src/js/record.js"></script>
</body>

</html>
