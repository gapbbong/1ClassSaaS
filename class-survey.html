<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>기초조사 모아보기</title>
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/class-survey.css">
</head>

<body>
    <div class="header-row">
        <button class="back-btn" onclick="history.back()">◀ 뒤로가기</button>
        <h2 id="class-title">반 기초조사 목록</h2>
        <div style="width: 80px;"></div> <!-- 스페이서 -->
    </div>

    <div class="filter-bar">
        <input type="text" id="search-input" placeholder="이름, 내용 검색...">
        <select id="filter-select">
            <option value="all">전체 보기</option>
            <option value="dreams">희망 진로 보기</option>
            <option value="mbti">MBTI 모아보기</option>
            <option value="family">가족/보호자 정보 보기</option>
        </select>
    </div>

    <div id="survey-list" class="survey-container loading">데이터를 불러오는 중입니다...</div>

    <script type="module" src="src/js/class-survey.js"></script>
</body>

</html>
