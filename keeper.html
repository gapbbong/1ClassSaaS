<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘의 조퇴/외출 현황판</title>
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/keeper.css">
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1e293b">
</head>

<body>
    <header class="keeper-header">
        <div class="header-left">
            <h1>🧑‍🏫 오늘의 조퇴/외출 현황</h1>
            <div id="current-date" class="date-text">로딩 중...</div>
        </div>
        <div class="header-right">
            <div id="current-time" class="time-text">00:00:00</div>
            <div style="display: flex; gap: 10px;">
                <button id="bulk-record-btn" class="bulk-btn" onclick="location.href='bulk-record.html?from=keeper'"
                    style="background: #6366f1; color: white; border: none; padding: 12px 24px; font-size: 1.3rem; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s;">📋
                    일괄 기록</button>
                <button id="logout-btn" class="logout-btn">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="keeper-main">
        <div class="status-summary">
            <div class="summary-box out">
                <span class="label">외출 학생</span>
                <span class="count"><span id="out-count">0</span>명</span>
            </div>
            <div class="summary-box early">
                <span class="label">조퇴 학생</span>
                <span class="count"><span id="early-count">0</span>명</span>
            </div>
        </div>

        <div id="list-container" class="list-container">
            <div id="loading-view" class="loading-state">데이터를 실시간으로 불러오는 중입니다...</div>
            <div id="empty-view" class="empty-state" style="display: none;">오늘 외출 또는 조퇴한 학생이 없습니다.</div>

            <div class="record-grid" id="record-grid">
                <!-- JS에서 카드 동적 생성 -->
            </div>
        </div>
    </main>
    <script type="module" src="src/js/keeper.js"></script>
</body>

</html>
