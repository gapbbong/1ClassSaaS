<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 목록</title>
  <link rel="stylesheet" href="src/css/main.css">
  <link rel="stylesheet" href="src/css/stu-list.css">
</head>

<body>
  <div class="title-row">
    <h2 id="class-title">반 정보</h2>
    <div id="teacher-info" class="teacher-info"></div>
  </div>

  <div id="student-list" class="student-grid loading">📷</div>

  <div id="overlay" onclick="closePopup()"></div>
  <div id="popup"></div>

  <button id="home-btn" title="메인으로">🏠</button>
  <button id="survey-viewer-btn" title="기초조사 모아보기">📋</button>

  <div class="floating-controls">
    <button id="prev-btn" title="이전 반">
      <svg viewBox="0 0 24 24">
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
      </svg>
    </button>
    <button id="next-btn" title="다음 반">
      <svg viewBox="0 0 24 24">
        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
      </svg>
    </button>
  </div>

  <script type="module" src="src/js/student.js"></script>

</body>

</html>
