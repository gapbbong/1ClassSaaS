<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>인쇄/출력</title>
    <!-- Use local css, plus a custom print-report.css -->
    <link rel="stylesheet" href="src/css/main.css?v=4.36">
    <link rel="stylesheet" href="src/css/print-report.css?v=4.36">
</head>
<body>
    <header class="search-header no-print">
        <button class="back-btn" onclick="location.href='index.html'" title="홈으로">🏠</button>
        <h1>🖨️ 인쇄/출력 </h1>
    </header>

    <main class="print-main">
        <!-- 설정 영역 (인쇄시 숨김) -->
        <section id="print-controls" class="no-print">
            <h2 class="section-title">출력 설정</h2>
            
            <div class="control-box">
                <div class="control-row">
                    <label>1. 범위 선택</label>
                    <select id="scope-select">
                        <option value="all">전체</option>
                        <option value="grade">학년별</option>
                        <option value="dept">과별</option>
                        <option value="grade_dept">학년+과별</option>
                        <option value="class">선택 반별</option>
                    </select>

                    <select id="grade-select" style="display:none;">
                        <option value="1">1학년</option>
                        <option value="2">2학년</option>
                        <option value="3">3학년</option>
                    </select>

                    <select id="dept-select" style="display:none;">
                        <option value="IoT전기과">IoT전기과</option>
                        <option value="게임콘텐츠과">게임콘텐츠과</option>
                        <option value="전자제어과">전자제어과</option>
                    </select>

                    <select id="class-select" style="display:none;">
                        <!-- JS에서 채워짐 -->
                    </select>
                </div>

                <div class="control-row" style="margin-top: 15px;">
                    <label>2. 포함 항목</label>
                    <div class="checkbox-group" id="category-checks">
                        <label><input type="checkbox" value="근태" checked> 근태</label>
                        <label><input type="checkbox" value="잘한 일" checked> 잘한 일</label>
                        <label><input type="checkbox" value="못한 일" checked> 못한 일</label>
                        <label><input type="checkbox" value="기타" checked> 기타</label>
                        <label><input type="checkbox" value="메모" checked> 메모</label>
                    </div>
                </div>

                <div class="control-action">
                    <button id="query-btn" class="primary-btn">조회하기</button>
                    <button id="print-btn" class="secondary-btn" style="display:none; background:#6366f1;">🖨️ 인쇄하기</button>
                    <button id="download-btn" class="secondary-btn" style="display:none; background:#10b981;">📊 엑셀 저장</button>
                </div>
            </div>
            <div id="loading-msg" style="display:none; text-align:center; color:#3b82f6; font-weight:bold; margin-top:10px;">데이터를 불러오는 중입니다...</div>
            <div id="error-msg" style="display:none; text-align:center; color:#ef4444; font-weight:bold; margin-top:10px;"></div>
        </section>

        <!-- 결과 영역 (인쇄되는 부분) -->
        <section id="print-result" style="display:none;">
            <div class="print-header-info">
                <h2 id="report-title">학생 기록 현황</h2>
                <p id="report-date"></p>
            </div>
            
            <div class="table-container">
                <table id="report-table">
                    <thead>
                        <tr id="table-head-row">
                            <!-- 동적 생성 -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- 동적 생성 -->
                    </tbody>
                    <tfoot id="table-foot">
                        <!-- 동적 생성 (합계) -->
                    </tfoot>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="src/js/print-report.js?v=4.36"></script>
</body>
</html>
