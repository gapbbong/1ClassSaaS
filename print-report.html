<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>인쇄/출력</title>
    <!-- Use local css, plus a custom print-report.css -->
    <link rel="stylesheet" href="src/css/main.css?v=4.70">
    <link rel="stylesheet" href="src/css/print-report.css?v=4.70">
</head>
<body>
    <header class="search-header no-print">
        <button class="back-btn" onclick="location.href='index.html'" title="홈으로">🏠</button>
        <h1>📊 통계 및 출력 </h1>
    </header>

    <main class="print-main">
        <!-- 설정 영역 (인쇄시 숨김) -->
        <section id="print-controls" class="no-print">
            <h2 class="section-title">출력 설정</h2>
            
            <div class="control-box">
                <div class="control-row flex-column" style="align-items: flex-start;">
                    <label>1. 범위</label>
                    <div class="scope-dropdowns">
                        <select id="scope-select">
                            <option value="all">전체</option>
                            <option value="grade">학년별</option>
                            <option value="dept">과별</option>
                            <option value="grade_dept">학년+과별</option>
                            <option value="class">반별</option>
                        </select>

                        <select id="grade-select" style="display:none;">
                            <option value="1">1학년</option>
                            <option value="2">2학년</option>
                            <option value="3">3학년</option>
                        </select>

                        <select id="dept-select" style="display:none;">
                            <option value="IoT전기과">IoT전기과</option>
                            <option value="게임콘텐츠과">게임콘텐츠과</option>
                            <option value="전자제어과">전자제어과</option>
                        </select>

                        <select id="class-select" style="display:none;">
                            <!-- JS에서 채워짐 -->
                        </select>
                    </div>
                </div>

                <div class="control-row flex-column" style="margin-top: 15px; align-items: flex-start;">
                    <label>2. 항목</label>
                    <div class="checkbox-group no-indent" id="category-checks">
                        <label><input type="checkbox" value="조퇴"> 조퇴</label>
                        <label><input type="checkbox" value="외출"> 외출</label>
                        <label><input type="checkbox" value="잘한 일"> 잘한 일</label>
                        <label id="bad-label"><input type="checkbox" value="못한 일" id="bad-main-check"> 못한 일</label>
                    </div>
                    <div class="checkbox-group no-indent">
                        <label><input type="checkbox" id="check-student-info"> 명렬(학번,이름,학적)</label>
                        <label><input type="checkbox" id="check-photo"> 사진</label>
                    </div>
                    
                    <!-- 못한 일 세부 항목 (JS에서 동적 생성) -->
                    <div id="bad-sub-container" class="sub-checkbox-box" style="display:none; margin-left:0;">
                        <div class="sub-header">
                            <label><input type="checkbox" id="bad-all-check"> <strong>못한 일 전체 선택</strong></label>
                        </div>
                        <div id="bad-sub-items" class="sub-items-grid">
                            <!-- JS에서 채워짐 -->
                        </div>
                    </div>
                </div>

                <div class="control-action">
                    <div class="sort-group">
                        <button id="sort-id-btn" class="sort-btn active">학번순</button>
                        <button id="sort-latest-btn" class="sort-btn">최신순</button>
                    </div>
                    <button id="query-btn" class="primary-btn">조회</button>
                    <button id="download-btn" class="secondary-btn" style="display:none; background:#10b981;">📊 엑셀 저장</button>
                </div>
                <div class="notice-text">
                    * 학생 이름을 클릭하면 사진을 볼 수 있습니다.
                </div>
            </div>
            <div id="loading-msg" style="display:none; text-align:center; color:#3b82f6; font-weight:bold; margin-top:10px;">데이터를 불러오는 중입니다...</div>
            <div id="error-msg" style="display:none; text-align:center; color:#ef4444; font-weight:bold; margin-top:10px;"></div>
        </section>

        <!-- 결과 영역 (인쇄되는 부분) -->
        <section id="print-result" style="display:none;">
            <div class="print-header-info">
                <div class="report-header-row">
                    <h2 id="report-title">학생 기록 현황</h2>
                    <div class="export-dropdown no-print">
                        <button id="export-btn" class="export-trigger-btn">📤 내보내기/인쇄</button>
                        <div class="export-menu">
                            <button class="export-item" onclick="document.getElementById('download-btn').click();">📊 엑셀 저장 (.xlsx)</button>
                            <button class="export-item" onclick="window.print();">📄 PDF 저장 / 인쇄</button>
                        </div>
                    </div>
                    <button id="photo-save-btn" class="primary-btn no-print" style="display:none; background:#f59e0b; border:none; padding:10px 20px; border-radius:12px; font-weight:800; color:white; cursor:pointer; box-shadow: 0 4px 6px -1px rgba(245,158,11, 0.2);">📸 사진 저장</button>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <p id="report-date" style="margin: 0;"></p>
                    <p id="student-count-display" style="margin: 0; font-weight: bold; font-size: 1.1rem; color: #1e293b;"></p>
                </div>
            </div>
            
            <div class="table-container">
                <table id="report-table">
                    <thead>
                        <tr id="table-head-row">
                            <!-- 동적 생성 -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- 동적 생성 -->
                    </tbody>
                    <tfoot id="table-foot">
                        <!-- 동적 생성 (합계) -->
                    </tfoot>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="src/js/print-report.js?v=4.70"></script>
    <!-- 학생 사진 모달 -->
    <div id="photo-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-student-info">학생 사진</h3>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <img id="modal-photo" src="./default.png" alt="학생 사진">
            </div>
        </div>
    </div>
    <!-- 사진 저장 안내 모달 (v4.67) -->
    <div id="photo-info-modal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width: 320px;">
            <div class="modal-header" style="background: #fffbeb;">
                <h3 style="color: #92400e;">📸 사진 저장 안내</h3>
                <button id="close-info-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body" style="background: white; padding: 25px 20px; line-height: 1.6; text-align: left;">
                <div style="font-size: 0.95rem; color: #475569; margin-bottom: 20px;">
                    <p style="margin-bottom: 12px; font-weight: 600; color: #1e293b;">📌 저장 방식 안내</p>
                    <ul style="padding-left: 18px; margin: 0; display: flex; flex-direction: column; gap: 8px;">
                        <li>파일명은 <strong>'학번 성명.jpg'</strong> 형식을 따릅니다.</li>
                        <li>조회 범위에 따른 <strong>하위 폴더가 자동 생성</strong>됩니다.</li>
                        <li style="color: #dc2626; font-weight: 700; background: #fef2f2; padding: 8px; border-radius: 6px; border: 1px dashed #fecaca;">
                            ⚠️ 바탕화면 등에 <strong>[새 폴더]</strong>를 하나 만드신 후, 그 폴더를 지정해야 정상적으로 저장됩니다. (시스템 폴더 방지)
                        </li>
                        <li>다량의 파일 저장 시 브라우저의 <strong>'다중 파일 허용'</strong> 팝업이 뜰 수 있습니다.</li>
                    </ul>
                </div>
                <button id="start-download-btn" class="primary-btn" style="width: 100%; background: #f59e0b; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);">지금 바로 폴더 선택 및 저장</button>
            </div>
        </div>
    </div>
</body>
</html>
